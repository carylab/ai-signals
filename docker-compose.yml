version: '3.9'

# ── Shared defaults ────────────────────────────────────────────────────────────
x-backend-env: &backend-env
  APP_ENV: development
  DEBUG: "false"
  DATABASE_URL: sqlite+aiosqlite:////app/data/db/ai_signals.db
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  PIPELINE_CRON: "0 6 * * *"
  PIPELINE_ENABLED: "true"
  LOG_LEVEL: INFO
  LOG_FORMAT: console
  EXPORT_DIR: /app/data/exports
  ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    volumes:
      - ./backend:/app              # live-reload in dev
      - ai_signals_data:/app/data   # persistent DB + exports
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Pipeline worker (optional — backend also runs scheduler internally) ──────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    volumes:
      - ./backend:/app
      - ai_signals_data:/app/data
    environment:
      <<: *backend-env
      PIPELINE_ENABLED: "false"    # worker manages its own schedule
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker   # opt-in: docker compose --profile worker up

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-prod
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_NAME: AI Signals
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ai_signals_data:
    driver: local
